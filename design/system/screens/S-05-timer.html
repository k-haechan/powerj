<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg">
<title>powerj S-05 — 실행 타이머</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  /* S-05 전용 — 링이 화면의 중심. 실행 중에는 크롬 최소화 */
  .proc-pill {
    display: inline-flex; align-items: center; gap: 8px; margin-top: var(--sp-lg);
    background: var(--surface); border-radius: var(--radius-full);
    box-shadow: var(--shadow-card); padding: 9px 16px 9px 10px;
  }
  .proc-pill .ico { width: 28px; height: 28px; border-radius: 9px; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .proc-pill b { font-size: 13.5px; letter-spacing: -.01em; }
  .proc-pill span { font-family: var(--font-num); font-size: 11px; color: var(--text-muted); }
  .center { display: flex; flex-direction: column; align-items: center; }
  .big-ring { width: 264px; height: 264px; margin-top: var(--sp-xl); --ring-w: 14px; --p: 54; }
  .big-ring .timer-num { font-family: var(--font-num); font-weight: 600; font-size: 54px; letter-spacing: -.04em; line-height: 1; }
  .big-ring .lbl { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .big-ring .lbl b { color: var(--ember); font-weight: 700; }
  .goals { width: 100%; }
  .goal-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
  .goal-row + .goal-row { border-top: 1px solid var(--edge); }
  .goal-row .gname { flex: 1; font-size: 14px; font-weight: 600; }
  .goal-row .gval { font-family: var(--font-num); font-size: 12.5px; color: var(--text-muted); }
  .goal-row .mini { display: block; width: 64px; }
  .goal-row .mini .heat-bar { height: 7px; }
  .dnd-pill {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: var(--sp-md); font-size: 12.5px; font-weight: 600; color: var(--ember);
    background: var(--ember-soft); border-radius: var(--radius-full); padding: 10px 16px;
  }
  .dnd-pill .dot { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  .acts { display: flex; gap: var(--sp-sm); }
</style>
</head>
<body>
<div class="screen">
  <div class="statusbar"><span>08:32</span><span>방해금지 ●</span></div>

  <div class="center">
    <div class="proc-pill">
      <span class="ico sky"><img src="../assets/icons/ico-commute.png" alt=""></span>
      <b>이동·출근</b>
      <span>08:00–09:00 · 2/8</span>
    </div>

    <div class="ring big-ring" role="img" aria-label="남은 시간 27:43 · 경과 54퍼센트">
      <div class="inner">
        <div class="timer-num">27:43</div>
        <div class="lbl">남음 · 경과 <b class="num">54%</b></div>
      </div>
    </div>

    <div class="dnd-pill"><span class="dot ember"></span>방해금지 가동 중 — 알림 <span class="num">6</span>건 보류</div>
  </div>

  <div class="panel goals">
    <div class="panel-label">이 시간의 정량 목표</div>
    <div class="goal-row">
      <span class="gname">실밸 개발자 영상</span>
      <span class="mini"><span class="heat-bar" aria-hidden="true"><i style="transform:scaleX(.5)"></i></span></span>
      <span class="gval">1 / 2</span>
    </div>
    <div class="goal-row">
      <span class="gname">책 200p까지 읽기</span>
      <span class="mini"><span class="heat-bar" aria-hidden="true"><i style="transform:scaleX(.74)"></i></span></span>
      <span class="gval">p.147 / 200</span>
    </div>
  </div>

  <div class="bottom-act no-tab">
    <div class="acts">
      <button class="btn btn-ghost" style="flex:1">일시정지</button>
      <button class="btn btn-primary" style="flex:2">완료 — 전환 검증</button>
    </div>
  </div>
</div>
</body>
</html>
