<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>powerj S-09 — 기록</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  /* S-09 전용 — 아카이브는 원장. 연출 없이, 쌓인 숫자와 링이 곧 스트릭이다. */

  /* 요약 카드: 좌측 연속 기록 스탯 + 우측 주 평균, 하단 7일 미니 링 */
  .sum-top { display: flex; justify-content: space-between; align-items: flex-end; gap: var(--sp-md); }
  .sum-top .k { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
  .sum-avg { text-align: right; font-size: 12.5px; color: var(--text-muted); font-weight: 600; }
  .sum-avg b { font-family: var(--font-num); font-size: 20px; font-weight: 600; color: var(--ember); display: block; letter-spacing: -.02em; }
  .week-dots { display: flex; justify-content: space-between; margin-top: var(--sp-md); padding-top: var(--sp-md); border-top: 1px solid var(--edge); }
  .wday { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .wday .ring { width: 30px; height: 30px; --ring-w: 4px; }
  .wday .ring .inner { font-size: 10px; line-height: 1; }
  .wday .ring.gold .inner { color: var(--gold); font-weight: 700; }
  .wday .wd { font-size: var(--text-micro); font-weight: 600; color: var(--text-faint); line-height: 1; }
  .wday.today .wd { color: var(--ember); font-weight: 700; }
  .wday.none .ring::before { background: var(--edge); } /* 미기록 = 트랙만, slate·red 아님 */

  /* 일별 원장 — .lrow 안에 날짜·미니 히트바·달성률 */
  .day-list .lrow { gap: var(--sp-md); }
  .day-list .d { font-size: 12.5px; color: var(--text-muted); width: 66px; flex-shrink: 0; font-weight: 600; }
  .day-list .d .num { font-size: 12px; font-weight: 500; color: var(--text); margin-right: 2px; }
  .day-list .lrow.none .d .num { color: var(--text-faint); }
  .day-list .heat-bar { flex: 1; height: 8px; }
  .day-list .lrow.none .heat-bar { background: var(--surface-2); border: 1px dashed var(--edge); }
  .day-list .val { width: 48px; text-align: right; flex-shrink: 0; }
  .day-list .val small { font-size: 10px; font-weight: 500; }
  .day-list .val.muted { font-family: var(--font-sans); font-size: 11.5px; font-weight: 500; }

  /* 주간 리포트 진입 카드 */
  a.report-card { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
  .report-card .ico { width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: var(--shadow-card); }
  .report-card .body { flex: 1; min-width: 0; }
  .report-card .name { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .report-card .meta { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
  .report-card .arrow { font-family: var(--font-num); font-size: 16px; color: var(--ember); flex-shrink: 0; }
</style>
</head>
<body>
<div class="screen">
  <div class="statusbar"><span>21:47</span><span>아카이브</span></div>

  <div class="screen-head">
    <div class="overline">기록</div>
    <h1 class="title">쌓인 하루들</h1>
    <p class="sub">마감한 하루가 그대로 원장이 된다 — 세는 것은 앱, 쌓는 것은 나</p>
  </div>

  <section class="panel big">
    <div class="sum-top">
      <div>
        <div class="k">연속 기록</div>
        <div class="stat">34<small>일</small></div>
      </div>
      <div class="sum-avg">이번 주 평균<b>84%</b></div>
    </div>
    <div class="week-dots" role="img" aria-label="최근 7일 달성률: 토 68%, 일 미기록, 월 82%, 화 76%, 수 100%, 목 91%, 금 87%">
      <div class="wday"><span class="ring" style="--p:68"><span class="inner"></span></span><span class="wd">토</span></div>
      <div class="wday none"><span class="ring" style="--p:0"><span class="inner"></span></span><span class="wd">일</span></div>
      <div class="wday"><span class="ring" style="--p:82"><span class="inner"></span></span><span class="wd">월</span></div>
      <div class="wday"><span class="ring" style="--p:76"><span class="inner"></span></span><span class="wd">화</span></div>
      <div class="wday"><span class="ring gold" style="--p:100"><span class="inner">✓</span></span><span class="wd">수</span></div>
      <div class="wday"><span class="ring" style="--p:91"><span class="inner"></span></span><span class="wd">목</span></div>
      <div class="wday today"><span class="ring" style="--p:87"><span class="inner"></span></span><span class="wd">금</span></div>
    </div>
  </section>

  <section class="panel day-list">
    <div class="panel-label">일별 달성률</div>
    <div class="lrow">
      <span class="d"><span class="num">07.04</span> 금</span>
      <span class="heat-bar"><i style="transform:scaleX(.87)"></i></span>
      <span class="val hot">87<small>%</small></span>
    </div>
    <div class="lrow">
      <span class="d"><span class="num">07.03</span> 목</span>
      <span class="heat-bar"><i style="transform:scaleX(.91)"></i></span>
      <span class="val hot">91<small>%</small></span>
    </div>
    <div class="lrow">
      <span class="d"><span class="num">07.02</span> 수</span>
      <span class="heat-bar is-gold"><i style="transform:scaleX(1)"></i></span>
      <span class="val gold">100<small>%</small></span>
    </div>
    <div class="lrow">
      <span class="d"><span class="num">07.01</span> 화</span>
      <span class="heat-bar"><i style="transform:scaleX(.76)"></i></span>
      <span class="val hot">76<small>%</small></span>
    </div>
    <div class="lrow">
      <span class="d"><span class="num">06.30</span> 월</span>
      <span class="heat-bar"><i style="transform:scaleX(.82)"></i></span>
      <span class="val hot">82<small>%</small></span>
    </div>
    <div class="lrow none">
      <span class="d"><span class="num">06.29</span> 일</span>
      <span class="heat-bar"></span>
      <span class="val muted">미기록</span>
    </div>
  </section>

  <a class="panel tint-ember report-card" href="S-10-weekly.html">
    <span class="ico">📈</span>
    <span class="body">
      <span class="name">6월 5주차 리포트가 준비됐어요</span>
      <span class="meta" style="display:block">주 평균 <span class="num">84%</span> · 실패 원인 1위 졸음</span>
    </span>
    <span class="arrow">→</span>
  </a>

  <nav class="tabbar">
    <a href="S-02-today.html"><span class="ti">📋</span>오늘</a>
    <a class="on" href="S-09-archive.html" aria-current="page"><span class="ti">📚</span>기록</a>
    <a href="S-10-weekly.html"><span class="ti">📈</span>리포트</a>
    <a href="S-11-settings.html"><span class="ti">⚙️</span>설정</a>
  </nav>
</div>
</body>
</html>
