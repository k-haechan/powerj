<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>powerj S-04 — 즉석 목표 수립</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  /* S-04 전용 — 즉석 수립은 10초 안에: 모드 카드 2장, 입력 1개, 칩으로 끝 */
  .modes { display: flex; gap: var(--sp-sm); }
  .modes .panel {
    flex: 1; margin-top: var(--sp-md); cursor: pointer; text-align: left;
    font-family: var(--font-sans); color: var(--text);
    display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
    min-height: 128px; transition: box-shadow var(--dur-short);
  }
  .modes .panel.sel { box-shadow: 0 0 0 2px var(--ember), var(--shadow-card); }
  .modes .ico { width: 38px; height: 38px; border-radius: 12px; font-size: 18px;
    display: flex; align-items: center; justify-content: center; }
  .modes .m-name { font-size: 15px; font-weight: 800; letter-spacing: -.01em; }
  .modes .m-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .modes .panel.sel .m-name { color: var(--ember); }
  .chips-label {
    font-family: var(--font-num); font-size: var(--text-micro); font-weight: 600;
    letter-spacing: .1em; color: var(--text-muted); text-transform: uppercase;
    margin: var(--sp-lg) 0 var(--sp-sm);
  }
  .micro-note {
    text-align: center; font-size: 11.5px; color: var(--text-muted);
    margin-bottom: var(--sp-sm);
  }
</style>
</head>
<body>
<div class="screen">
  <div class="statusbar"><span>14:58</span><span>슬롯 15:00 → 15:45</span></div>

  <div class="screen-head">
    <div class="overline info">즉석 계획 — 15:00 슬롯</div>
    <h1 class="title">지금 <span class="num">45</span>분이 비었어요</h1>
    <p class="sub">다음 고정 프로세스 · <span class="num">15:45</span> 오후 업무 재개</p>
  </div>

  <div class="modes" role="radiogroup" aria-label="목표 수립 방식">
    <button class="panel sel" role="radio" aria-checked="true">
      <span class="ico ember">⏱</span>
      <span class="m-name">시간 기준</span>
      <span class="m-desc"><span class="num">45</span>분 안에<br>어디까지?</span>
    </button>
    <button class="panel" role="radio" aria-checked="false">
      <span class="ico sky">🎯</span>
      <span class="m-name">목표 기준</span>
      <span class="m-desc"><span class="num">15:45</span>까지<br>반드시</span>
    </button>
  </div>

  <div class="field">
    <label for="jit-goal">이 시간의 정량 목표</label>
    <input id="jit-goal" type="text" placeholder="예: CS 문제 10개">
  </div>

  <div class="chips-label">최근 목표에서 바로 선택</div>
  <div class="chips">
    <button class="chip ember">CS 문제 <span class="num">10</span>개</button>
    <button class="chip ember">이슈 <span class="num">2</span>개 정리</button>
    <button class="chip ember">영상 <span class="num">1</span>개</button>
  </div>

  <div class="bottom-act no-tab">
    <p class="micro-note">수립은 <span class="num">10</span>초면 충분해요</p>
    <button class="btn btn-primary">🔥 타이머 시작 — 방해금지 ON</button>
  </div>
</div>
</body>
</html>
