<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg">
<title>powerj S-06 — 전환 검증 게이트</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  /* S-06 전용 — 전환 검증 게이트: 시트처럼, 통과해야 다음 프로세스로 */
  .gate-head { display: flex; align-items: center; gap: 12px; padding-top: var(--sp-lg); }
  .gate-head .ico { width: 44px; height: 44px; border-radius: 14px; font-size: 20px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .gate-head .htext { min-width: 0; }

  /* 중앙 링 + 10% 다이얼 */
  .rate-center { display: flex; align-items: center; justify-content: center; gap: var(--sp-lg); margin-top: var(--sp-xl); }
  .gate-ring { width: 140px; height: 140px; --p: 70; --ring-w: 12px; }
  .gate-ring .stat { color: var(--ember); }
  .gate-ring .rlbl { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }
  .dial-btn {
    width: 48px; height: 48px; border-radius: var(--radius-full); border: none; cursor: pointer;
    background: var(--surface); box-shadow: var(--shadow-card); color: var(--text);
    font-family: var(--font-num); font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform var(--dur-micro);
  }
  .dial-btn:active { transform: scale(.94); }
  .rate-note { text-align: center; font-size: var(--text-caption); color: var(--text-muted); margin-top: var(--sp-sm); }

  /* 목표 리뷰 행 — 미니 히트 바 + 자동 계산 % */
  .goal-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
  .goal-row + .goal-row { border-top: 1px solid var(--edge); }
  .goal-row .gname { flex: 1; font-size: 14px; font-weight: 600; min-width: 0; }
  .goal-row .mini { display: block; width: 56px; flex-shrink: 0; }
  .goal-row .mini .heat-bar { height: 7px; }
  .goal-row .gval { font-family: var(--font-num); font-size: 12px; color: var(--text-muted); }
  .goal-row .gpct { font-family: var(--font-num); font-size: 13px; font-weight: 600; color: var(--ember); width: 38px; text-align: right; }
  .auto-note { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-muted); margin-top: var(--sp-sm); }

  /* 시간 노트 — 초과도 데이터, slate */
  .time-note { display: flex; justify-content: space-between; align-items: center; gap: var(--sp-sm); }
  .time-note .tlabel { font-size: 12.5px; font-weight: 600; color: var(--slate); }
  .time-note .tval { font-family: var(--font-num); font-size: 12.5px; font-weight: 600; color: var(--slate); }
</style>
</head>
<body>
<div class="screen">
  <div class="statusbar"><span>09:02</span><span>Process 02/08</span></div>

  <div class="gate-head">
    <span class="ico sky"><img src="../assets/icons/ico-commute.png" alt=""></span>
    <div class="htext screen-head" style="padding-top:0">
      <div class="overline">전환 검증</div>
      <h1 class="title">이동·출근, 얼마나 해냈나요?</h1>
      <p class="sub"><span class="num">08:00–09:02</span> · <span class="num">62분</span> <span class="num">(+2분)</span></p>
    </div>
  </div>

  <div class="rate-center">
    <button type="button" class="dial-btn" aria-label="달성률 10퍼센트 내리기">−10</button>
    <div class="ring gate-ring" role="status" aria-label="이 프로세스 달성률 70퍼센트">
      <div class="inner">
        <div class="stat">70<small>%</small></div>
        <div class="rlbl">달성률</div>
      </div>
    </div>
    <button type="button" class="dial-btn" aria-label="달성률 10퍼센트 올리기">+10</button>
  </div>
  <p class="rate-note"><span class="num">10%</span> 단위로 조정할 수 있어요 <span class="num">(68% → 70%)</span></p>

  <div class="panel">
    <div class="panel-label">목표 리뷰</div>
    <div class="goal-row">
      <span class="gname">실밸 개발자 영상</span>
      <span class="mini"><span class="heat-bar"><i style="transform:scaleX(.5)"></i></span></span>
      <span class="gval">1 / 2</span>
      <span class="gpct">50%</span>
    </div>
    <div class="goal-row">
      <span class="gname">책 200p까지 읽기</span>
      <span class="mini"><span class="heat-bar"><i style="transform:scaleX(.86)"></i></span></span>
      <span class="gval">p.171 / 200</span>
      <span class="gpct">86%</span>
    </div>
    <div class="auto-note">정량 목표는 자동 계산돼요</div>
  </div>

  <div class="panel">
    <div class="panel-label">무엇이 막았나요? — 기록은 데이터가 됩니다</div>
    <div class="chips" role="group" aria-label="실패 원인 선택">
      <button type="button" class="chip set" aria-pressed="true">졸음</button>
      <button type="button" class="chip" aria-pressed="false">과몰입</button>
      <button type="button" class="chip" aria-pressed="false">알림</button>
      <button type="button" class="chip" aria-pressed="false">컨디션</button>
      <button type="button" class="chip" aria-pressed="false">목표 과다</button>
    </div>
  </div>

  <div class="panel tint-slate time-note">
    <span class="tlabel">시간 효율</span>
    <span class="tval">+2분 초과</span>
  </div>

  <div class="bottom-act no-tab">
    <button type="button" class="btn btn-primary">길게 눌러 확정 (<span class="num">0.45초</span>)</button>
  </div>
</div>
</body>
</html>
