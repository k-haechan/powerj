<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg">
<title>powerj S-08 — 오늘의 일기</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css" rel="stylesheet">
<link href="https://hangeul.pstatic.net/hangeul_static/css/maru-buri.css" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  /* S-08 전용 — 숫자의 하루 끝에 사람의 문장. 화면 전체가 한 톤 조용하다 */
  .mode-chips { margin-top: var(--sp-md); }

  /* 기계 초안 미리보기 — 실패도 정보도 slate */
  .draft-preview { display: flex; align-items: flex-start; gap: 10px; }
  .draft-preview .ico {
    width: 34px; height: 34px; border-radius: 11px; flex-shrink: 0;
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .draft-preview p { font-size: var(--text-caption); color: var(--text-muted); line-height: 1.7; }
  .draft-preview p .num { color: var(--slate); font-weight: 600; }
  .draft-preview p b { color: var(--slate); font-weight: 700; }

  /* 일기 지면 — MaruBuri, 넉넉한 행간 */
  .diary-panel { padding: 24px 20px 16px; }
  .diary-panel .panel-label { color: var(--text-faint); }
  .diary-body .caret {
    display: inline-block; width: 1.5px; height: 1.05em; margin-left: 2px;
    background: var(--ember); vertical-align: -0.12em;
    border-radius: 1px; animation: blink 1.2s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .diary-meta {
    margin-top: var(--sp-lg); padding-top: 12px; border-top: 1px dashed var(--edge);
    font-size: var(--text-micro); letter-spacing: .06em; color: var(--text-faint);
    display: flex; justify-content: flex-end;
  }

  /* 심지 — 마감 굿나잇: 하루를 차분히 닫는 등불의 온기 (ember 나이트라이트) */
  .diary-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  .diary-head .htext { min-width: 0; }
  .simji-night { position: relative; flex-shrink: 0; width: 66px; margin-top: 2px; }
  .simji-night::before {
    content: ''; position: absolute; z-index: 0; pointer-events: none;
    left: 50%; top: 58%; transform: translate(-50%, -50%);
    width: 74px; height: 56px;
    background: radial-gradient(ellipse at center,
      color-mix(in srgb, var(--ember) 15%, transparent) 0%,
      color-mix(in srgb, var(--ember) 5%, transparent) 46%,
      transparent 72%);
  }
  .simji-night img { position: relative; z-index: 1; width: 66px; height: auto; animation: simji-float 5s ease-in-out infinite; }
  @keyframes simji-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @media (prefers-reduced-motion: reduce) { .simji-night img { animation: none; } }
</style>
</head>
<body>
<div class="screen">
  <div class="statusbar"><span>22:47</span><span>하루 마감 2/3</span></div>

  <div class="screen-head diary-head">
    <div class="htext">
      <div class="overline">하루 마감</div>
      <h1 class="title">오늘의 일기</h1>
      <p class="sub">검증은 기계가 했다. 문장은 당신의 몫이다.</p>
    </div>
    <div class="simji-night">
      <img src="../assets/mascot/simji-goodnight.png" alt="심지 — 하루를 차분히 닫는 굿나잇" width="66" height="66">
    </div>
  </div>

  <div class="chips mode-chips" role="radiogroup" aria-label="일기 작성 방식">
    <button class="chip ember set" role="radio" aria-checked="true">기록으로 초안 만들기</button>
    <button class="chip" role="radio" aria-checked="false">백지에서 쓰기</button>
  </div>

  <div class="panel tint-slate">
    <div class="draft-preview">
      <span class="ico"><img src="../assets/icons/ico-bot.png" alt=""></span>
      <p>
        오늘 <span class="num">8</span>개 프로세스, 도장 <span class="num">9</span>개.
        오전 업무 <span class="num">92%</span> · 점심 CS <span class="num">4/5</span>문제.
        이동·출근의 <b>졸음</b>이 <span class="num">3</span>일째 — 영상
        <span class="num">2</span>개 목표는 <span class="num">1</span>개에서 멈췄다…
      </p>
    </div>
  </div>

  <div class="panel big diary-panel">
    <div class="panel-label">나의 문장</div>
    <p class="diary-body">
      출근길 졸음이 사흘째다. 그 시간에 영상 두 개는 애초에 무리였다는 걸,
      숫자가 나보다 먼저 알고 있었다. 내일은 한 개만 걸어두고 확실하게 끝내자.<span class="caret" aria-hidden="true"></span>
    </p>
    <div class="diary-meta">
      <span class="num">126</span>자 · 자동 저장됨
    </div>
  </div>

  <div class="bottom-act no-tab">
    <button class="btn btn-primary">하루 봉인 — 내일 계획으로</button>
  </div>
</div>
</body>
</html>
