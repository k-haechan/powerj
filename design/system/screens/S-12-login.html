<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>powerj S-12 — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  /* S-12 전용 — 복귀 사용자를 따뜻하게, 데이터로 맞이한다 */
  .screen.auth { padding-bottom: 32px; } /* 탭바 없음 — 인라인 플로우 */
  .greet { display: flex; align-items: center; gap: 14px; }
  .greet .ring { width: 62px; height: 62px; --ring-w: 7px; flex-shrink: 0; }
  .greet .ring .inner .pv { font-family: var(--font-num); font-size: 14px; font-weight: 600; color: var(--ember); letter-spacing: -.02em; }
  .greet .g-body b { font-size: 14.5px; font-weight: 800; letter-spacing: -.01em; }
  .greet .g-body p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .greet .g-body .num { font-size: 12px; color: var(--ember); font-weight: 600; }
  .links { display: flex; justify-content: space-between; align-items: center; margin-top: var(--sp-md); font-size: 12.5px; }
  .links a { color: var(--text-muted); text-decoration: none; font-weight: 600; }
  .links a.join { color: var(--ember); font-weight: 700; }
  .social { display: flex; flex-direction: column; gap: var(--sp-sm); margin-top: var(--sp-sm); }
  .social .btn { min-height: 50px; font-size: 14.5px; }
  .social .mark {
    width: 26px; height: 26px; border-radius: var(--radius-full); flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; font-family: var(--font-num);
  }
  .mark.g { background: var(--slate-soft); color: var(--slate); }
  .mark.a { background: var(--text); color: #fff; }
  .mark.k { background: var(--gold-soft); color: #99751A; }
  .foot { margin-top: var(--sp-xl); text-align: center; font-size: 11.5px; color: var(--text-faint); }
</style>
</head>
<body>
<div class="screen auth">
  <div class="statusbar"><span>21:14</span><span>POWERJ</span></div>

  <div class="screen-head">
    <div class="overline">돌아온 걸 환영해요</div>
    <h1 class="title">다시 이어서 쌓아볼까요?</h1>
  </div>

  <div class="panel tint-ember big greet">
    <div class="ring" style="--p: 84">
      <div class="inner"><span class="pv">84%</span></div>
    </div>
    <div class="g-body">
      <b>기록이 기다리고 있어요</b>
      <p><b class="num">34</b>일째 기록 중 · 주 평균 <b class="num">84%</b></p>
    </div>
  </div>

  <form onsubmit="return false">
    <div class="field">
      <label for="email">이메일</label>
      <input id="email" type="email" placeholder="you@example.com" value="haechan@powerj.app">
    </div>
    <div class="field err">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" value="••••••••">
      <p class="err-msg">비밀번호가 일치하지 않아요 — <b class="num">4</b>회 남음</p>
    </div>

    <div style="margin-top: var(--sp-lg)">
      <button class="btn btn-primary" type="submit">로그인</button>
    </div>
    <div class="links">
      <a href="#">비밀번호 재설정</a>
      <a href="S-13-signup.html" class="join">처음인가요? 회원가입 →</a>
    </div>
  </form>

  <div class="divider">또는</div>
  <div class="social">
    <button class="btn btn-ghost"><span class="mark g">G</span> Google로 계속하기</button>
    <button class="btn btn-ghost"><span class="mark a"></span> Apple로 계속하기</button>
    <button class="btn btn-ghost"><span class="mark k">K</span> 카카오로 계속하기</button>
  </div>

  <p class="foot">로그인하면 기기 간 동기화됩니다</p>
</div>
</body>
</html>
