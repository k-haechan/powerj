<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg">
<title>powerj S-12 — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  /* S-12 전용 — 복귀 사용자를 따뜻하게, 데이터로 맞이한다 */
  .screen.auth { padding-bottom: 32px; } /* 탭바 없음 — 인라인 플로우 */
  .greet { display: flex; align-items: center; gap: 14px; }
  .greet .ring { width: 62px; height: 62px; --ring-w: 7px; flex-shrink: 0; }
  .greet .ring .inner .pv { font-family: var(--font-num); font-size: 14px; font-weight: 600; letter-spacing: -.02em; }
  .greet .g-body b { font-size: 14.5px; font-weight: 800; letter-spacing: -.01em; }
  .greet .g-body p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .greet .g-body .num { font-size: 12px; color: var(--ember); font-weight: 600; }
  .links { display: flex; justify-content: space-between; align-items: center; margin-top: var(--sp-md); font-size: 12.5px; }
  .links a { color: var(--text-muted); text-decoration: none; font-weight: 600; }
  .links a.join { color: var(--ember); font-weight: 700; }
  .social { display: flex; flex-direction: column; gap: var(--sp-sm); margin-top: var(--sp-sm); }
  .social .btn { min-height: 50px; font-size: 14.5px; }
  .social .mark {
    width: 26px; height: 26px; border-radius: var(--radius-full); flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; font-family: var(--font-num);
  }
  .mark.g { background: #fff; border: 1px solid var(--edge); } /* Google 브랜드 마크 */
  .mark.a { background: var(--text); color: #fff; }
  .mark.k { background: #FEE500; color: #191919; } /* 카카오 브랜드 컬러 — gold(100% 전용) 시맨틱과 무관 */
  .foot { margin-top: var(--sp-xl); text-align: center; font-size: 11.5px; color: var(--text-faint); }

  /* 심지 — 복귀 인사 (wave): 데이터로 따뜻하게 맞이한다 */
  .welcome-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  .welcome-head .htext { min-width: 0; }
  .simji-hi { position: relative; flex-shrink: 0; width: 66px; margin-top: 2px; }
  .simji-hi::before {
    content: ''; position: absolute; z-index: 0; pointer-events: none;
    left: 50%; top: 58%; transform: translate(-50%, -50%);
    width: 74px; height: 56px;
    background: radial-gradient(ellipse at center,
      color-mix(in srgb, var(--ember) 15%, transparent) 0%, transparent 70%);
  }
  .simji-hi img { position: relative; z-index: 1; width: 66px; height: auto; animation: simji-float 4.6s ease-in-out infinite; }
  @keyframes simji-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @media (prefers-reduced-motion: reduce) { .simji-hi img { animation: none; } }
</style>
</head>
<body>
<div class="screen auth">
  <div class="statusbar"><span>21:14</span><span>POWERJ</span></div>

  <div class="screen-head welcome-head">
    <div class="htext">
      <div class="overline">돌아온 걸 환영해요</div>
      <h1 class="title">다시 이어서 쌓아볼까요?</h1>
    </div>
    <div class="simji-hi">
      <img src="../assets/mascot/simji-wave.png" alt="심지 — 반갑게 손 흔드는 인사" width="66" height="66">
    </div>
  </div>

  <div class="panel tint-ember big greet">
    <div class="ring" role="img" aria-label="주 평균 84퍼센트" style="--p: 84">
      <div class="inner"><span class="pv">84%</span></div>
    </div>
    <div class="g-body">
      <b>기록이 기다리고 있어요</b>
      <p><b class="num">34</b>일째 기록 중 · 주 평균 <b class="num">84%</b></p>
    </div>
  </div>

  <form onsubmit="return false">
    <div class="field">
      <label for="email">이메일</label>
      <input id="email" type="email" placeholder="you@example.com" value="haechan@powerj.app">
    </div>
    <div class="field err">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" value="••••••••">
      <p class="err-msg">비밀번호가 일치하지 않아요 — <b class="num">4</b>회 남음</p>
    </div>

    <div style="margin-top: var(--sp-lg)">
      <button class="btn btn-primary" type="submit">로그인</button>
    </div>
    <div class="links">
      <a href="#">비밀번호 재설정</a>
      <a href="S-13-signup.html" class="join">처음인가요? 회원가입 →</a>
    </div>
  </form>

  <div class="divider">또는</div>
  <div class="social">
    <button class="btn btn-ghost"><span class="mark g"><svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="#4285F4" d="M23.5 12.3c0-.9-.1-1.5-.3-2.2H12v4.1h6.5c-.1 1.1-.8 2.7-2.4 3.8l3.7 2.9c2.2-2 3.7-5 3.7-8.6z"/><path fill="#34A853" d="M12 24c3.2 0 5.9-1.1 7.9-2.9l-3.7-2.9c-1 .7-2.4 1.2-4.2 1.2-3.2 0-5.9-2.1-6.8-5l-3.9 3C3.3 21.3 7.3 24 12 24z"/><path fill="#FBBC05" d="M5.2 14.4c-.2-.7-.4-1.5-.4-2.4s.1-1.7.4-2.4l-3.9-3C.5 8.2 0 10 0 12s.5 3.8 1.3 5.4l3.9-3z"/><path fill="#EA4335" d="M12 4.7c1.8 0 3 .8 3.7 1.4l3.3-3.2C17.9 1 15.2 0 12 0 7.3 0 3.3 2.7 1.3 6.6l3.9 3c.9-2.9 3.6-4.9 6.8-4.9z"/></svg></span> Google로 계속하기</button>
    <button class="btn btn-ghost"><span class="mark a"><svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M16.7 12.9c0-2.4 2-3.6 2.1-3.7-1.1-1.7-2.9-1.9-3.5-1.9-1.5-.16-2.9.88-3.7.88-.8 0-1.9-.86-3.2-.83-1.6.02-3.1.96-4 2.4-1.7 3-.4 7.4 1.2 9.8.8 1.2 1.8 2.5 3 2.4 1.2-.05 1.7-.78 3.1-.78s1.9.78 3.2.75c1.3-.02 2.2-1.18 3-2.38.9-1.4 1.3-2.7 1.3-2.77-.03-.01-2.5-.96-2.5-3.83zM14.4 5.6c.66-.8 1.1-1.9 .98-3-.95.04-2.1.63-2.78 1.43-.61.7-1.15 1.85-1 2.94 1.06.08 2.14-.54 2.8-1.37z"/></svg></span> Apple로 계속하기</button>
    <button class="btn btn-ghost"><span class="mark k"><svg viewBox="0 0 24 24" width="14" height="14" fill="#191919" aria-hidden="true"><path d="M12 3C6.5 3 2 6.6 2 11c0 2.8 1.9 5.3 4.7 6.7l-1 3.7c-.1.4.3.7.6.5l4.4-2.9c.4 0 .8.1 1.3.1 5.5 0 10-3.6 10-8S17.5 3 12 3z"/></svg></span> 카카오로 계속하기</button>
  </div>

  <p class="foot">로그인하면 기기 간 동기화됩니다</p>
</div>
</body>
</html>
